<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paperkingdom — Yoshi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f0e0c;--paper:#f5f0e8;--paper2:#ede7d9;
  --accent:#3a8a28;--muted:#8a8070;
  --border:rgba(15,14,12,0.12);
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',sans-serif;
  --bg: #f0ebe2;
}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);height:100vh;overflow:hidden;display:flex;flex-direction:column;transition:background 0.3s,color 0.3s}

/* Dark mode */
body.dark{
  --ink:#f0ebe2;--paper:#161412;--paper2:#1e1b18;
  --accent:#5dbf46;--muted:#8a8070;
  --border:rgba(240,235,226,0.1);
  --bg:#0e0c0a;
}
body.dark nav{background:var(--paper)}
body.dark .sidebar{background:var(--paper)}
body.dark .sb-foot{background:var(--paper)}
body.dark .controls{background:var(--paper)}

nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px;background:var(--paper);border-bottom:1px solid var(--border);flex-shrink:0;transition:background 0.3s,border-color 0.3s}
.logo{font-family:var(--serif);font-size:1.4rem;font-weight:900;letter-spacing:-0.02em;color:var(--ink);text-decoration:none;transition:color 0.3s}
.logo span{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:1rem}
.nav-model{font-size:0.82rem;color:var(--muted);display:flex;align-items:center;gap:0.5rem}
.nav-model strong{color:var(--ink);font-weight:500;transition:color 0.3s}
.dark-toggle{background:none;border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:0.75rem;color:var(--muted);cursor:pointer;transition:all 0.2s;font-family:var(--sans)}
.dark-toggle:hover{border-color:var(--ink);color:var(--ink)}

.viewer-wrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:250px;min-width:250px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--paper);overflow:hidden;transition:background 0.3s,border-color 0.3s}
.sb-head{padding:1rem 1rem 0.75rem;border-bottom:1px solid var(--border)}
.sb-head h2{font-family:var(--serif);font-size:1.05rem;font-weight:700;margin-bottom:0.15rem;color:var(--ink);transition:color 0.3s}
.sb-head p{font-size:0.75rem;color:var(--muted)}
.sb-meta{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border)}
.sb-meta-item{padding:0.6rem 0.8rem;border-right:1px solid var(--border)}
.sb-meta-item:last-child{border-right:none}
.sb-meta-item .lbl{font-size:0.68rem;color:var(--muted);display:block;margin-bottom:0.1rem;text-transform:uppercase;letter-spacing:0.06em}
.sb-meta-item .val{font-size:0.82rem;font-weight:500;color:var(--ink);transition:color 0.3s}
.sb-section-label{padding:0.5rem 1rem;font-size:0.68rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
.sb-list{flex:1;overflow-y:auto;padding:6px}
.section-header{
  font-size:0.68rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--accent);padding:8px 10px 4px;margin-top:4px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  border-radius:4px;transition:background 0.12s;
}
.section-header:hover{background:var(--paper2)}
.section-header:first-child{margin-top:0}
.section-header .sec-count{font-size:0.65rem;color:var(--muted);font-weight:400;letter-spacing:0}
.section-header .sec-label{display:flex;align-items:center;gap:6px}
.sec-arrow{font-size:14px;transition:transform 0.2s;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:4px;color:var(--muted);cursor:pointer;flex-shrink:0}.sec-arrow:hover{background:var(--paper2)}
.section-header.collapsed .sec-arrow{transform:rotate(-90deg)}
.piece-item.sec-hidden{display:none}

.section-header .sec-right{display:flex;align-items:center;gap:8px}
.eye-btn{
  background:none;border:none;cursor:pointer;padding:2px 4px;
  border-radius:4px;transition:background 0.12s;color:var(--muted);
  display:flex;align-items:center;line-height:1;
}
.eye-btn:hover{background:var(--paper2);color:var(--ink)}
.eye-btn svg{width:14px;height:14px;display:block}
.section-header.hidden-sec .sec-right .eye-btn{color:var(--border)}

.piece-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:background 0.12s,border-color 0.12s;margin-bottom:2px;user-select:none}
.piece-item:hover{background:var(--paper2)}
.piece-item.active{background:#edf7ea;border-color:#a8d49a}
body.dark .piece-item.active{background:#1a2e18;border-color:#3a6a30}
.piece-item.active .pi-num,.piece-item.active .pi-name{color:var(--accent)}
.pi-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;border:1px solid rgba(0,0,0,0.15)}
.pi-num{font-size:10px;color:var(--muted);margin:0}
.pi-name{font-size:12px;font-weight:500;color:var(--ink);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.3s}
.sb-foot{padding:0.6rem 1rem;border-top:1px solid var(--border);transition:background 0.3s}
.clear-btn{font-size:0.75rem;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:none;transition:all 0.12s;width:100%;font-family:var(--sans)}
.clear-btn:hover{border-color:var(--ink);color:var(--ink)}

.canvas-wrap{flex:1;position:relative}
#main-canvas{width:100%;height:100%;display:block}
.c-label{position:absolute;top:12px;right:12px;font-size:12px;font-weight:500;color:var(--accent);background:#edf7ea;border:1px solid #a8d49a;padding:4px 12px;border-radius:20px;pointer-events:none;display:none;max-width:55%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
body.dark .c-label{background:#1a2e18;border-color:#3a6a30}
.c-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--muted);background:var(--paper);border:1px solid var(--border);padding:3px 12px;border-radius:20px;pointer-events:none;white-space:nowrap;transition:background 0.3s}

/* Step mode overlay */
.step-overlay{
  position:absolute;top:12px;right:12px;
  display:none;flex-direction:column;align-items:flex-end;gap:6px;
}
.step-badge{
  font-family:var(--serif);font-size:0.9rem;font-weight:700;
  color:var(--ink);background:var(--paper);
  border:1px solid var(--border);padding:5px 14px;border-radius:20px;
  transition:background 0.3s,color 0.3s;
}
.step-nav{display:flex;gap:6px}
.step-btn{
  font-family:var(--sans);font-size:0.78rem;font-weight:500;
  padding:4px 12px;border-radius:20px;
  border:1px solid var(--border);background:var(--paper);
  color:var(--ink);cursor:pointer;transition:all 0.12s;
}
.step-btn:hover{background:var(--paper2)}
.step-btn:disabled{opacity:0.35;cursor:default}

.loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:var(--paper);z-index:10;transition:background 0.3s}
.loading-overlay p{font-family:var(--serif);font-size:1.1rem;color:var(--muted)}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.controls{padding:0.6rem 1.25rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:1rem;background:var(--paper);flex-wrap:wrap;flex-shrink:0;transition:background 0.3s,border-color 0.3s}
.ctrl-btn{font-family:var(--sans);font-size:0.78rem;font-weight:500;padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--ink);cursor:pointer;white-space:nowrap;transition:all 0.12s}
.ctrl-btn:hover{border-color:var(--ink)}
.ctrl-btn.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.ctrl-row{display:flex;align-items:center;gap:8px;flex:1;min-width:140px}
.ctrl-row label{font-size:0.75rem;color:var(--muted);white-space:nowrap}
.ctrl-row input[type=range]{flex:1;accent-color:var(--accent)}
.ctrl-row span{font-size:0.75rem;font-weight:500;min-width:32px;text-align:right;color:var(--ink);transition:color 0.3s}


/* ═══════════════════════════════════
   MOBILE & RESPONSIVE
═══════════════════════════════════ */

/* Sidebar toggle button — only on mobile */
#sidebar-toggle{display:none}

@media (max-width: 768px) {
  /* Layout: stack vertically */
  body{height:100vh;height:100dvh}

  nav{padding:0 1rem;height:50px}
  .logo{font-size:1.1rem}
  .nav-right{gap:0.5rem}
  .nav-model{font-size:0.72rem}
  .dark-toggle{padding:2px 8px;font-size:0.7rem}

  .viewer-wrap{flex-direction:column}

  /* Sidebar becomes a bottom sheet */
  .sidebar{
    position:fixed;bottom:0;left:0;right:0;
    width:100%!important;min-width:unset!important;
    height:60vh;
    border-right:none!important;
    border-top:2px solid var(--border);
    border-radius:16px 16px 0 0;
    transform:translateY(calc(100% - 52px));
    transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
    z-index:50;
    box-shadow:0 -8px 40px rgba(0,0,0,0.12);
  }
  .sidebar.open{transform:translateY(0)}

  /* Drag handle at top of sidebar */
  .sidebar::before{
    content:'';
    display:block;width:36px;height:4px;
    background:var(--border);border-radius:2px;
    margin:10px auto 0;flex-shrink:0;
  }

  /* Sidebar toggle button */
  #sidebar-toggle{
    display:flex;align-items:center;justify-content:space-between;
    width:100%;padding:10px 1rem 8px;
    background:none;border:none;cursor:pointer;
    font-family:var(--sans);font-size:0.78rem;font-weight:500;
    color:var(--ink);border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  #sidebar-toggle .toggle-label{display:flex;align-items:center;gap:8px}
  #sidebar-toggle .toggle-arrow{
    transition:transform 0.3s;font-size:0.7rem;color:var(--muted)
  }
  .sidebar.open #sidebar-toggle .toggle-arrow{transform:rotate(180deg)}
  #sidebar-toggle .toggle-count{
    font-size:0.7rem;background:var(--accent);color:white;
    padding:2px 8px;border-radius:10px;display:none;
  }
  #sidebar-toggle .toggle-count.has-sel{display:inline-block}

  .sb-head{padding:0.6rem 1rem 0.5rem}
  .sb-head h2{font-size:0.9rem}
  .sb-head p{font-size:0.7rem}
  .sb-meta{display:none}

  /* Canvas takes full remaining height */
  .canvas-wrap{
    flex:1;
    height:calc(100dvh - 50px - 56px);
  }

  /* Controls bar: compact horizontal scroll */
  .controls{
    padding:0.4rem 0.75rem;
    gap:0.5rem;
    overflow-x:auto;
    flex-wrap:nowrap;
    height:48px;
    align-items:center;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .controls::-webkit-scrollbar{display:none}
  .ctrl-btn{padding:5px 12px;font-size:0.72rem;white-space:nowrap}
  .ctrl-row{min-width:160px;flex-shrink:0}
  .ctrl-row label{font-size:0.7rem;white-space:nowrap}
  .ctrl-row span{font-size:0.7rem;min-width:28px}

  /* Explode switch compact */
  .explode-switch{gap:4px}
  .switch-opt{padding:3px 8px;font-size:0.7rem}

  /* Labels */
  .c-label{font-size:11px;padding:3px 10px;max-width:50%}
  .c-hint{font-size:10px;padding:2px 10px;bottom:8px}

  /* Step overlay */
  .step-overlay{top:8px;right:8px;gap:4px}
  .step-badge{font-size:0.78rem;padding:4px 10px}
  .step-btn{font-size:0.7rem;padding:3px 10px}

  /* Pieces list: bigger tap targets */
  .piece-item{padding:10px 12px;margin-bottom:3px}
  .pi-name{font-size:13px}

  /* Section headers: bigger */
  .section-header{padding:10px 12px 6px}

  /* Overlay when sidebar open */
  #sidebar-overlay{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,0.3);z-index:49;
  }
  #sidebar-overlay.visible{display:block}
}

@media (max-width: 400px) {
  .controls{height:44px}
  .ctrl-btn{padding:4px 10px;font-size:0.68rem}
}

@media (max-width: 768px) {
  /* Hide sidebar entirely on mobile, show only step mode */
  .sidebar{ display:none!important; }

  /* Mobile step UI — floating over model */
  .mobile-step-bar{
    display:none;
    position:absolute;
    bottom:56px;left:50%;transform:translateX(-50%);
    background:var(--paper);
    border:1px solid var(--border);
    border-radius:40px;
    padding:8px 12px;
    align-items:center;gap:10px;
    box-shadow:0 4px 24px rgba(0,0,0,0.12);
    z-index:20;
    white-space:nowrap;
    max-width:90vw;
  }
  .mobile-step-bar.visible{ display:flex; }
  .mobile-step-piece{
    font-family:var(--serif);font-size:0.9rem;font-weight:700;
    color:var(--accent);min-width:60px;text-align:center;
  }
  .mobile-step-progress{
    font-size:0.7rem;color:var(--muted);
  }
  .mobile-step-nav{display:flex;gap:6px}
  .mobile-step-nav button{
    width:36px;height:36px;border-radius:50%;
    border:1px solid var(--border);background:var(--paper);
    color:var(--ink);font-size:1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all 0.15s;font-family:var(--sans);
  }
  .mobile-step-nav button:hover{background:var(--paper2)}
  .mobile-step-nav button:disabled{opacity:0.3;cursor:default}
  .mobile-step-nav button.exit{
    background:var(--ink);color:var(--paper);border-color:var(--ink);
    width:auto;border-radius:20px;padding:0 14px;font-size:0.75rem;font-weight:500;
  }

  /* On mobile: hide desktop step overlay */
  body.step-active-mobile .step-overlay{ display:none!important; }

  /* Mobile step trigger button — visible in controls */
  .mobile-step-trigger{ display:flex!important; }

  /* Hide sidebar on mobile when not needed */
  body.step-active-mobile .sidebar{ display:none!important; }
}

@media (min-width: 769px) {
  .mobile-step-bar{ display:none!important; }
  .mobile-step-trigger{ display:none!important; }
}

@media (max-width: 768px) {
  .mobile-empezar-float{
    position:absolute;
    bottom:56px;left:50%;transform:translateX(-50%);
    background:var(--paper);color:var(--ink);
    font-family:var(--sans);font-size:0.9rem;font-weight:500;
    padding:12px 36px;border-radius:30px;
    border:1px solid var(--border);
    box-shadow:0 2px 16px rgba(0,0,0,0.10);
    cursor:pointer;letter-spacing:0.04em;
    z-index:20;transition:background 0.15s;
    display:flex;align-items:center;gap:8px;
    white-space:nowrap;
  }
  .mobile-empezar-float:active{background:var(--paper2)}
  body.step-active-mobile .mobile-empezar-float{display:none!important}
  /* Hide controls on mobile */
  .controls{display:none!important;}
  /* Canvas fills full height minus nav */
  .canvas-wrap{
    height:calc(100dvh - 50px)!important;
  }
}
@media (min-width: 769px){
  .mobile-empezar-float{display:none!important}
}

.reset-cam-btn{
  position:absolute;top:12px;left:12px;
  height:32px;padding:0 12px;border-radius:20px;
  background:var(--paper);color:var(--ink);
  border:1px solid var(--border);
  font-family:var(--sans);font-size:0.75rem;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  box-shadow:0 1px 6px rgba(0,0,0,0.08);
  transition:background 0.15s;
  z-index:20;line-height:1;letter-spacing:0.02em;
}
.reset-cam-btn:hover{background:var(--paper2)}
.reset-cam-btn:active{opacity:0.7}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── MOBILE SIDEBAR ──────────────────────────────
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('visible');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}



// Touch swipe to open/close sidebar
(function(){
  const sb=document.getElementById('sidebar');
  if(!sb) return;
  let startY=0, startX=0;
  sb.addEventListener('touchstart',e=>{
    startY=e.touches[0].clientY;
    startX=e.touches[0].clientX;
  },{passive:true});
  sb.addEventListener('touchmove',e=>{
    const dy=e.touches[0].clientY-startY;
    const dx=Math.abs(e.touches[0].clientX-startX);
    if(Math.abs(dy)>dx){
      if(dy>40) closeSidebar();
      else if(dy<-40) document.getElementById('sidebar').classList.add('open');

// Build crease edges — only show edges where face angle > threshold
// POSIBLE CAMBIO: umbral de angulo para aristas del wireframe (en grados)
function buildCreaseEdges(geo, thresholdDeg) {
  const threshold=Math.cos(thresholdDeg*Math.PI/180);
  const pos=geo.attributes.position, index=geo.index;
  const tris=[];
  if(index) { for(let i=0;i<index.count;i+=3) tris.push([index.getX(i),index.getX(i+1),index.getX(i+2)]); }
  else { for(let i=0;i<pos.count;i+=3) tris.push([i,i+1,i+2]); }
  const v0=new THREE.Vector3(),v1=new THREE.Vector3(),v2=new THREE.Vector3(),e1=new THREE.Vector3(),e2=new THREE.Vector3();
  const faceNormals=tris.map(([a,b,c])=>{
    v0.fromBufferAttribute(pos,a);v1.fromBufferAttribute(pos,b);v2.fromBufferAttribute(pos,c);
    e1.subVectors(v1,v0);e2.subVectors(v2,v0);
    return new THREE.Vector3().crossVectors(e1,e2).normalize();
  });
  const edgeMap=new Map();
  const edgeKey=(a,b)=>a<b?`${a}_${b}`:`${b}_${a}`;
  tris.forEach(([a,b,c],fi)=>{
    [[a,b],[b,c],[c,a]].forEach(([p,q])=>{
      const k=edgeKey(p,q);
      if(!edgeMap.has(k)) edgeMap.set(k,{verts:[p,q],faces:[]});
      edgeMap.get(k).faces.push(fi);
    });
  });
  const edgeVerts=[];
  edgeMap.forEach(({verts:[a,b],faces})=>{
    let keep=faces.length===1;
    if(!keep&&faces.length>=2) keep=faceNormals[faces[0]].dot(faceNormals[faces[1]])<threshold;
    if(keep){
      v0.fromBufferAttribute(pos,a);v1.fromBufferAttribute(pos,b);
      edgeVerts.push(v0.x,v0.y,v0.z,v1.x,v1.y,v1.z);
    }
  });
  const creaseGeo=new THREE.BufferGeometry();
  creaseGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(edgeVerts),3));
  return creaseGeo;
}

// Async GLB decryption and loading
_initModel().then(function(glbBuffer){
const {gltf,binBuffer}=parseGLB(glbBuffer);
const pieceIndexMap={};
PIECES.forEach((p,i)=>pieceIndexMap[p.name]=i);

gltf.nodes.forEach(node=>{
  if(node.mesh===undefined) return;
  const pieceDef=PIECES.find(p=>p.name===node.name)||{name:node.name,color:0x888888};
  const pieceIdx=pieceIndexMap[node.name]??-1;

  gltf.meshes[node.mesh].primitives.forEach(prim=>{
    const geo=new THREE.BufferGeometry();
    const posData=new Float32Array(getAccessor(gltf,binBuffer,prim.attributes.POSITION));
    geo.setAttribute('position',new THREE.BufferAttribute(posData,3));
    if(prim.attributes.NORMAL!==undefined)
      geo.setAttribute('normal',new THREE.BufferAttribute(new Float32Array(getAccessor(gltf,binBuffer,prim.attributes.NORMAL)),3));
    else geo.computeVertexNormals();
    if(prim.indices!==undefined)
      geo.setIndex(new THREE.BufferAttribute(new Uint32Array(getAccessor(gltf,binBuffer,prim.indices)),1));

    // POSIBLE CAMBIO: textura de papel procedural en el shader
    const mat=new THREE.ShaderMaterial({
      side:THREE.DoubleSide, transparent:false,
      uniforms:{
        uColor:    {value:new THREE.Color(pieceDef.color)},
        uOpacity:  {value:1.0},
        uLightDir: {value:new THREE.Vector3(0.4,0.8,0.6).normalize()},
        uLightDir2:{value:new THREE.Vector3(-0.6,-0.2,-0.4).normalize()},
      },
      vertexShader:`
        varying vec3 vNormal; varying vec3 vWorldPos;
        void main(){
          vNormal=normalize(normalMatrix*normal);
          vWorldPos=(modelMatrix*vec4(position,1.0)).xyz;
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
        }`,
      fragmentShader:`
        uniform vec3 uColor; uniform float uOpacity;
        uniform vec3 uLightDir; uniform vec3 uLightDir2;
        varying vec3 vNormal; varying vec3 vWorldPos;
        float hash(vec2 p){p=fract(p*vec2(234.34,435.345));p+=dot(p,p+34.23);return fract(p.x*p.y);}
        float noise(vec2 p){vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
        float grain(vec3 pos){vec2 uv=pos.xy*180.0;float n=noise(uv)*0.55+noise(uv*2.1+vec2(1.7,9.2))*0.28+noise(uv*4.3+vec2(8.3,2.8))*0.12+noise(uv*8.7+vec2(3.1,6.4))*0.05;return n;}
        void main(){
          vec3 n=normalize(vNormal);
          float light=0.52+max(dot(n,uLightDir),0.0)*0.45+max(dot(n,uLightDir2),0.0)*0.15;
          float g=(grain(vWorldPos)-0.5)*0.12;
          vec3 col=mix(uColor,vec3(0.97,0.94,0.88),0.08)*light+g;
          gl_FragColor=vec4(clamp(col,0.0,1.0),uOpacity);
        }`
    });

    const m=new THREE.Mesh(geo,mat);
    if(node.translation) m.position.fromArray(node.translation);
    if(node.rotation)    m.quaternion.fromArray(node.rotation);
    if(node.scale)       m.scale.fromArray(node.scale);
    m.userData={pieceDef,pieceId:pieceIdx,nodeName:node.name};
    group.add(m); meshes.push(m);

    // Wireframe with piece color darkened
    // POSIBLE CAMBIO: angulo de crease para wireframe (en grados)
    const CREASE_ANGLE_DEG=2;
    const creaseGeo=buildCreaseEdges(geo,CREASE_ANGLE_DEG);
    const r=((pieceDef.color>>16)&0xff)/255;
    const gC=((pieceDef.color>>8)&0xff)/255;
    const bC=(pieceDef.color&0xff)/255;
    const wireColor=new THREE.Color(r*0.35, gC*0.35, bC*0.35);
    const wireMat=new THREE.LineBasicMaterial({color:wireColor,transparent:true,opacity:0.7});
    const wire=new THREE.LineSegments(creaseGeo,wireMat);
    if(node.translation) wire.position.fromArray(node.translation);
    if(node.rotation)    wire.quaternion.fromArray(node.rotation);
    if(node.scale)       wire.scale.fromArray(node.scale);
    wire.visible=true;
    group.add(wire); wireMeshes.push(wire);
  });
});

// Center & scale
const box=new THREE.Box3().setFromObject(group);
const sz=new THREE.Vector3(); box.getSize(sz);
group.scale.setScalar(2.2/Math.max(sz.x,sz.y,sz.z));
const box2=new THREE.Box3().setFromObject(group);
const c2=new THREE.Vector3(); box2.getCenter(c2); group.position.sub(c2);
camera.position.set(0,-0.3,(2.2/2)/Math.tan(camera.fov*Math.PI/360)*2.4);
camera.lookAt(0,0,0);
// Store initial state for camera reset
INIT_GROUP_POS.copy(group.position);
INIT_CAM_Z=camera.position.z;
INIT_CAM_Y=camera.position.y;

// Scale-based separation: store base scale for each mesh
meshes.forEach((m,i)=>{
  m.userData.basePos = m.position.clone();
  m.userData.baseScale = m.scale.clone();
  wireMeshes[i].userData.basePos = wireMeshes[i].position.clone();
  wireMeshes[i].userData.baseScale = wireMeshes[i].scale.clone();
});

// Precompute per-section explode dirs from BASE positions (before any animation)
const secCenters={};
meshes.forEach(m=>{
  const sec=getSec(m.userData.pieceDef.name);
  if(!secCenters[sec]) secCenters[sec]=new THREE.Vector3();
  secCenters[sec].add(m.userData.basePos);
});
const secCounts={};
meshes.forEach(m=>{ const sec=getSec(m.userData.pieceDef.name); secCounts[sec]=(secCounts[sec]||0)+1; });
Object.keys(secCenters).forEach(sec=>{
  secCenters[sec].divideScalar(secCounts[sec]);
  const d=secCenters[sec].clone().normalize();
  if(d.length()<0.001) d.set(0,1,0);
  secCenters[sec]=d;
});
meshes.forEach(m=>{
  const sec=getSec(m.userData.pieceDef.name);
  m.userData.secExplodeDir=secCenters[sec];
});

const hiddenSections = new Set();
const collapsedSections = new Set();

function toggleSectionCollapse(section, hdr) {

}


const SECTIONS=[...new Set(PIECES.map(p=>p.name.match(/^([A-Z]+)/)?.[1]||p.name))];

function buildList(){
  const list=document.getElementById('pieces-list'); list.innerHTML='';
  let lastSection='';
  PIECES.forEach((p,i)=>{
    const section=p.name.match(/^([A-Z]+)/)?.[1]||p.name;

      const hdr=document.createElement('div');
      hdr.className='section-header';
      hdr.dataset.section=section;
      hdr.innerHTML=`
        <span class="sec-label"><span class="sec-arrow">▾</span>Sección ${section}</span>
        <span class="sec-right">
          <span class="sec-count">${count} piezas</span>
          <button class="eye-btn" data-section="${section}" title="Mostrar/ocultar sección">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="8" cy="8" rx="6" ry="4"/>
              <circle cx="8" cy="8" r="2" fill="currentColor" stroke="none"/>
            </svg>
          </button>
        </span>`;
      hdr.addEventListener('click',(e)=>{
        if(e.target.closest('.eye-btn')) return;
        if(e.target.closest('.sec-arrow')) { toggleSectionCollapse(section, hdr); return; }
        if(!stepMode) selectSection(section);
      });
      hdr.querySelector('.eye-btn').addEventListener('click',(e)=>{
        e.stopPropagation();
        toggleSectionVisibility(section, hdr);
      });
      list.appendChild(hdr);
      lastSection=section;
    }
    const el=document.createElement('div');
    el.className='piece-item'; el.id='pi-'+i;
    const hex='#'+p.color.toString(16).padStart(6,'0');
    el.innerHTML=`<div class="pi-dot" style="background:${hex}"></div><div class="pi-info"><p class="pi-name">${p.name}</p></div>`;
    el.dataset.section=section;
    el.addEventListener('click',()=>{if(!stepMode) togglePiece(i);});
    list.appendChild(el);
  });
  // Colapsar todas las secciones por defecto
  document.querySelectorAll('.section-header').forEach(hdr=>{
    const sec=hdr.dataset.section;
    if(sec) toggleSectionCollapse(sec,hdr);
  });
}

// ── SELECT SECTION ──────────────────────────────────────
function selectSection(section){
  if(stepMode) return;
  const secPieces=PIECES.map((p,i)=>({i,sec:p.name.match(/^([A-Z]+)/)?.[1]||p.name})).filter(x=>x.sec===section);
  const allSelected=secPieces.every(x=>selected.has(x.i));
  // If all pieces of section already selected -> deselect, else add all
  secPieces.forEach(x=>{ if(allSelected) selected.delete(x.i); else selected.add(x.i); });
  applyColors();
}

// ── TOGGLE PIECE ────────────────────────────────────────
function togglePiece(id){
  if(selected.has(id)) selected.delete(id); else selected.add(id);
  applyColors();
}
function clearSel(){ selected.clear(); applyColors(); }



function toggleSectionVisibility(section, hdr) {
  const isHidden = hiddenSections.has(section);
  if (isHidden) {
    hiddenSections.delete(section);
    hdr.querySelector('.eye-btn').innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="8" cy="8" rx="6" ry="4"/><circle cx="8" cy="8" r="2" fill="currentColor" stroke="none"/></svg>`;
    hdr.style.opacity = '1';
  } else {
    hiddenSections.add(section);
    hdr.querySelector('.eye-btn').innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="2" x2="14" y2="14"/><path d="M6.5 3.5A6.5 4 0 0 1 14 8M2 5.5A6.5 4 0 0 0 9.5 12.5"/><circle cx="8" cy="8" r="2" fill="currentColor" stroke="none" opacity="0.4"/></svg>`;
    hdr.style.opacity = '0.45';
  }
  // Show/hide meshes for this section
  meshes.forEach((m, i) => {
    const sec = m.userData.pieceDef?.name.match(/^([A-Z]+)/)?.[1] || '';
    if (sec === section) {
      m.visible = !hiddenSections.has(section);
      if (wireMeshes[i]) wireMeshes[i].visible = m.visible;
    }
  });
  // Deselect hidden pieces
  PIECES.forEach((p, i) => {
    const sec = p.name.match(/^([A-Z]+)/)?.[1] || '';
    if (sec === section && hiddenSections.has(section)) selected.delete(i);
  });
  applyColors();
}


document.getElementById('clear-btn').addEventListener('click',clearSel);

// ── APPLY COLORS ────────────────────────────────────────
function applyColors(){
  const hasSel=selected.size>0;
  meshes.forEach(m=>{
    const pid=m.userData.pieceId, pd=m.userData.pieceDef;
    const isSel=selected.has(pid);
    if(!hasSel||isSel){
      m.material.uniforms.uColor.value.setHex(pd.color);
      m.material.uniforms.uOpacity.value=1.0;
      m.material.transparent=false; m.material.depthWrite=true; m.renderOrder=1;
    }else{
      m.material.uniforms.uColor.value.setHex(pd.color);
      m.material.uniforms.uOpacity.value=bgOpacity;
      m.material.transparent=true; m.material.depthWrite=false; m.renderOrder=0;
    }
    m.material.needsUpdate=true;
    // Wireframe sigue la misma opacidad que la pieza
    const wi = wireMeshes[meshes.indexOf(m)];
    if (wi) {
      const isSel2 = selected.has(m.userData.pieceId);
      wi.material.opacity = (!hasSel || isSel2) ? 0.7 : bgOpacity * 0.7;
      wi.material.needsUpdate = true;
    }
  });
  document.querySelectorAll('.piece-item').forEach((el,i)=>el.classList.toggle('active',selected.has(i)));
  const label=document.getElementById('c-label'), cb=document.getElementById('clear-btn');
  if(selected.size===0){label.style.display='none';cb.style.display='none';}
  else if(selected.size===1){
    const id=[...selected][0];
    label.textContent=`1 pieza · ${PIECES[id]?.name||String(id+1)}`;
    label.style.display='block'; cb.style.display='block';
    document.getElementById('pi-'+id)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  }else{
    const lastId=[...selected][selected.size-1];
    label.textContent=`${selected.size} piezas · ${PIECES[lastId]?.name||String(lastId+1)}`;
    label.style.display='block'; cb.style.display='block';
  }
  const badge=document.getElementById('toggle-count');
  if(badge){badge.textContent=selected.size;badge.classList.toggle('has-sel',selected.size>0);}
}

// ── STEP MODE ───────────────────────────────────────────
// Ordered unique sections

function enterStepMode(){
  stepMode=true; stepIndex=0;
  selected.clear();
  document.getElementById('step-overlay').style.display='flex';
  document.getElementById('c-label').style.display='none';
  document.getElementById('clear-btn').style.display='none';
  document.getElementById('c-hint').style.display='none';
  document.getElementById('step-btn').classList.add('on');
  document.getElementById('step-btn').textContent='Salir del modo';
  document.querySelector('.ctrl-row:last-child').style.display='none';
  applyStep();
}
function exitStepMode(){
  stepMode=false;
  document.getElementById('step-overlay').style.display='none';
  document.getElementById('c-hint').style.display='block';
  document.getElementById('step-btn').classList.remove('on');
  document.getElementById('step-btn').textContent='Ensamblaje paso a paso';
  document.querySelector('.ctrl-row:last-child').style.display='flex';
  meshes.forEach((m,i)=>{
    m.visible=true;
    if(wireMeshes[i]) wireMeshes[i].visible=true;
  });
  clearSel();
}
function getSec(name){ return name.match(/^([A-Z]+)/)?.[1]||name; }
let _lastAutoFrameSec = null;
function applyStep(){
  // Finish step
  if(stepIndex === PIECES.length){
    meshes.forEach((m,i)=>{
      m.visible=true;
      m.material.uniforms.uOpacity.value=1.0;
      m.material.transparent=false; m.material.depthWrite=true; m.renderOrder=1;
      m.material.needsUpdate=true;
      if(wireMeshes[i]) wireMeshes[i].visible=true;
    });
    document.querySelectorAll('.piece-item').forEach(el=>el.classList.remove('active'));
    document.getElementById('step-badge').textContent='🎉 ¡Listo!';
    document.getElementById('step-prev').disabled=false;
    document.getElementById('step-next').disabled=true;
    afTarget={posX:INIT_GROUP_POS.x, posY:INIT_GROUP_POS.y, camZ:INIT_CAM_Z};
    afActive=true;
    return;
  }
  const curPiece=PIECES[stepIndex];
  const curSec=getSec(curPiece.name);
  // Auto-encuadre solo cuando cambia de sección
  if(curSec !== _lastAutoFrameSec){
    _lastAutoFrameSec = curSec;
    setTimeout(()=>autoFrameSection(curSec), 80);
  }
  meshes.forEach((m,i)=>{
    const pd=m.userData.pieceDef;
    const pid=m.userData.pieceId;
    const sec=getSec(pd.name);
    const curSecIdx=SECTIONS.indexOf(curSec);
    const pieceSec=SECTIONS.indexOf(sec);

    if(pieceSec<curSecIdx){
      // Sección ya terminada: oculta
      m.visible=false;
      if(wireMeshes[i]) wireMeshes[i].visible=false;
    } else if(pieceSec===curSecIdx && pid<=stepIndex){
      // Pieza de la sección actual ya armada o la actual
      m.visible=true;
      const isNew=pid===stepIndex;
      m.material.uniforms.uColor.value.setHex(pd.color);
      m.material.uniforms.uOpacity.value=1.0;
      m.material.transparent=false; m.material.depthWrite=true; m.renderOrder=1;
      m.material.needsUpdate=true;
      if(wireMeshes[i]) wireMeshes[i].visible=true;
    } else {
      // Pieza futura (misma sección o secciones siguientes): invisible
      m.visible=false;
      if(wireMeshes[i]) wireMeshes[i].visible=false;
    }
  });
  document.querySelectorAll('.piece-item').forEach((el,i)=>el.classList.toggle('active',i===stepIndex));
  document.getElementById('pi-'+stepIndex)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  document.getElementById('step-badge').textContent=`${curPiece.name}  (${stepIndex+1} / ${PIECES.length})`;
  document.getElementById('step-prev').disabled=stepIndex===0;
  document.getElementById('step-next').disabled=stepIndex>PIECES.length-1;
}

document.getElementById('step-btn').addEventListener('click',()=>{
  if(stepMode) exitStepMode(); else enterStepMode();
});
document.getElementById('step-prev').addEventListener('click',()=>{
  if(stepIndex>0){stepIndex--;applyStep();}
});
document.getElementById('step-next').addEventListener('click',()=>{
  if(stepIndex<PIECES.length){stepIndex++;applyStep();}
  else exitStepMode();
});

// ── TOUCH ────────────────────────────────────────────────
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
let touch0={x:0,y:0},touch1={x:0,y:0},pinchDist=0,touchCount=0;

function doRaycast(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  mouse.x=((clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(meshes);
  if(hits.length>0) togglePiece(hits[0].object.userData.pieceId);
  else clearSel();
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  dragMoved=false; isDrag=false; isPan=false;
  touchCount=e.touches.length;
  prevX=e.touches[0].clientX; prevY=e.touches[0].clientY;
  touch0={x:prevX,y:prevY};
  if(e.touches.length===1) isDrag=true;
  else if(e.touches.length===2){
    pinchDist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    touch1={x:e.touches[1].clientX,y:e.touches[1].clientY};
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1 && isDrag){
    const dx=e.touches[0].clientX-prevX, dy=e.touches[0].clientY-prevY;
    if(Math.abs(dx)>2||Math.abs(dy)>2) dragMoved=true;
    rotY+=dx*0.012; rotX+=dy*0.012;
    prevX=e.touches[0].clientX; prevY=e.touches[0].clientY;
  } else if(e.touches.length===2){
    const newDist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    camera.position.z=Math.max(0.5,Math.min(20,camera.position.z+(pinchDist-newDist)*0.015));
    pinchDist=newDist;
    const midX=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const midY=(e.touches[0].clientY+e.touches[1].clientY)/2;
    group.position.x+=(midX-(touch0.x+touch1.x)/2)*0.004;
    group.position.y-=(midY-(touch0.y+touch1.y)/2)*0.004;
    touch0={x:e.touches[0].clientX,y:e.touches[0].clientY};
    touch1={x:e.touches[1].clientX,y:e.touches[1].clientY};
    dragMoved=true;
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  isDrag=false;
  if(!dragMoved && touchCount===1 && !stepMode){
    doRaycast(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
},{passive:false});

// ── MOUSE CLICK SELECT ───────────────────────────────────
canvas.addEventListener('click',e=>{
  if(dragMoved||stepMode)return;
  doRaycast(e.clientX,e.clientY);
});

// ── AUTO ENCUADRE POR SECCIÓN (fit to selection) ─────────
let afTarget = null;
let afActive = false;

function autoFrameSection(section) {
  const secMeshes = meshes.filter(m => getSec(m.userData.pieceDef.name) === section);
  if (!secMeshes.length) return;

  // Compute center of section using base positions (unaffected by rotation)
  // basePos is in group-local space before rotation
  let cx=0, cy=0, cz=0, count=0;
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity,minZ=Infinity,maxZ=-Infinity;
  secMeshes.forEach(m => {
    const p = m.userData.basePos;
    cx+=p.x; cy+=p.y; cz+=p.z; count++;
    minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x);
    minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y);
    minZ=Math.min(minZ,p.z); maxZ=Math.max(maxZ,p.z);
  });
  cx/=count; cy/=count; cz/=count;

  const s = group.scale.x; // uniform scale
  // To center this section: shift group so section center lands at origin
  // group.position offset needed = -center * scale
  const targetPosX = -cx * s;
  const targetPosY = -cy * s;

  // Size of bounding box in world units
  const sizeX = (maxX - minX) * s;
  const sizeY = (maxY - minY) * s;
  const sizeZ = (maxZ - minZ) * s;
  const maxDim = Math.max(sizeX, sizeY, sizeZ, 0.3);

  // Fit zoom with padding (1.8x so it's not too tight)
  const fov = camera.fov * Math.PI / 180;
  // Clamp maxDim to avoid outlier sections (e.g. H with wrong coordinates)
  // Normal sections are 0.1–0.8 units, anything larger is likely a coordinate anomaly
  const clampedDim = Math.min(maxDim, 0.9);
  const rawZ = (clampedDim / 2) / Math.tan(fov / 2) * 2.8;
  const targetZ = Math.min(
    Math.max(rawZ, INIT_CAM_Z * 0.75),
    INIT_CAM_Z * 1.05
  );

  afTarget = { posX: targetPosX, posY: targetPosY, camZ: targetZ };
  afActive = true;
}

function updateAutoFrame() {
  if (!afActive || !afTarget) return;
  const s = 0.07;
  group.position.x += (afTarget.posX - group.position.x) * s;
  group.position.y += (afTarget.posY - group.position.y) * s;
  camera.position.z += (afTarget.camZ - camera.position.z) * s;
  if (Math.abs(group.position.x - afTarget.posX) < 0.002 &&
      Math.abs(group.position.y - afTarget.posY) < 0.002 &&
      Math.abs(camera.position.z - afTarget.camZ) < 0.002) {
    afActive = false;
  }
}

function animate(){
  requestAnimationFrame(animate);
  curExplode+=(tgtExplode-curExplode)*0.07;
  // Scale-based gap: shrink each piece from its own origin
  // curExplode=0 → full size, curExplode=1 → reduced to gapScale
  const gapScale = 1.0 - curExplode * 0.12; // max 12% smaller = elegant gap
  meshes.forEach((m,i)=>{
    const bs = m.userData.baseScale;
    m.scale.set(bs.x*gapScale, bs.y*gapScale, bs.z*gapScale);
    m.position.copy(m.userData.basePos);
    if(wireMeshes[i]){
      const ws = wireMeshes[i].userData.baseScale;
      wireMeshes[i].scale.set(ws.x*gapScale, ws.y*gapScale, ws.z*gapScale);
      wireMeshes[i].position.copy(wireMeshes[i].userData.basePos);
    }
  });
  updateAutoFrame();
  group.rotation.x=rotX; group.rotation.y=rotY;
  renderer.render(scene,camera);
}
animate();
}).catch(function(e){console.error("Decryption failed",e);});

// ── MOBILE SIDEBAR ──────────────────────────────
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('visible');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}



// Touch swipe to open/close sidebar
(function(){
  const sb=document.getElementById('sidebar');
  if(!sb) return;
  let startY=0, startX=0;
  sb.addEventListener('touchstart',e=>{
    startY=e.touches[0].clientY;
    startX=e.touches[0].clientX;
  },{passive:true});
  sb.addEventListener('touchmove',e=>{
    const dy=e.touches[0].clientY-startY;
    const dx=Math.abs(e.touches[0].clientX-startX);
    if(Math.abs(dy)>dx){
      if(dy>40) closeSidebar();
      else if(dy<-40) document.getElementById('sidebar').classList.add('open');
    }
  },{passive:true});
})();


// ── MOBILE STEP MODE ─────────────────────────────────────
const isMobileDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
let mobileStepMode = false;

function updateMobileStepUI(){
  const p = PIECES[stepIndex];
  const el = document.getElementById('m-step-piece');
  const pr = document.getElementById('m-step-progress');
  const prev = document.getElementById('m-step-prev');
  const next = document.getElementById('m-step-next');
  if(el) el.textContent = p?.name || '';
  if(pr) pr.textContent = (stepIndex+1) + ' / ' + PIECES.length;
  if(prev) prev.disabled = stepIndex === 0;
  if(next) next.disabled = stepIndex > PIECES.length - 1;
  if(stepIndex === PIECES.length){
    if(el) el.textContent = '🎉 ¡Listo!';
    if(pr) pr.textContent = '';
    // Close step mode after short delay
    setTimeout(()=>exitMobileStepMode(), 1800);
  }
}

function enterMobileStepMode(){
  mobileStepMode = true;
  stepMode = true; stepIndex = 0;
  selected.clear();
  document.body.classList.add('step-active-mobile');
  document.getElementById('mobile-step-bar').classList.add('visible');
  document.getElementById('c-label').style.display='none';
  closeSidebar();
  updateMobileStepUI();
  applyStep();
}

function exitMobileStepMode(){
  mobileStepMode = false;
  stepMode = false;
  document.body.classList.remove('step-active-mobile');
  document.getElementById('mobile-step-bar').classList.remove('visible');
  document.getElementById('c-hint').style.display='block';
  meshes.forEach((m,i)=>{ m.visible=true; if(wireMeshes[i]) wireMeshes[i].visible=true; });
  clearSel();
}

// Wire up mobile step buttons
const mStepBtn = document.getElementById('mobile-step-btn');
if(mStepBtn) mStepBtn.addEventListener('click', ()=>{
  if(mobileStepMode) exitMobileStepMode(); else enterMobileStepMode();
});

const mPrev = document.getElementById('m-step-prev');
const mNext = document.getElementById('m-step-next');
const mExit = document.getElementById('m-step-exit');

if(mPrev) mPrev.addEventListener('click',()=>{ if(stepIndex>0){stepIndex--;applyStep();updateMobileStepUI();} });
if(mNext) mNext.addEventListener('click',()=>{ if(stepIndex<PIECES.length){stepIndex++;applyStep();updateMobileStepUI();} else exitMobileStepMode(); });
if(mExit) mExit.addEventListener('click', exitMobileStepMode);

// On mobile: hide desktop step button, show mobile one
if(isMobileDevice){
  const desktopBtn = document.getElementById('step-btn');
  const mobileBtn  = document.getElementById('mobile-step-btn');
  if(desktopBtn) desktopBtn.style.display='none';
  if(mobileBtn)  mobileBtn.style.display='flex';
}


// ── RESET CAMERA ─────────────────────────────────────────
const DEFAULT_ROT_X = 0.3, DEFAULT_ROT_Y = 0.5;
document.getElementById('reset-cam-btn').addEventListener('click', ()=>{
  rotX = DEFAULT_ROT_X;
  rotY = DEFAULT_ROT_Y;
  group.position.copy(INIT_GROUP_POS);
  camera.position.set(0, INIT_CAM_Y, INIT_CAM_Z);
  camera.lookAt(0, 0, 0);
});
